name: Auth.Wiedersehen FE Build and Publish

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

env:
  WORKING_DIR: src/Auth.Wiedersehen.WebClient

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: npm install
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install

      - name: run linters
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run lint

      - name: run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:unit

      - name: build docker image
        run: docker compose build auth-wiedersehen-web

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: type=sha,prefix=

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.WORKING_DIR }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  docker-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test, docker-build]
    permissions:
      packages: write
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: type=sha,prefix=

      - name: Determine image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}-web' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Tag and push image
        run: |
          docker tag ${{ steps.meta.outputs.tags }} ${{ steps.image.outputs.name }}:latest
          docker push ${{ steps.meta.outputs.tags }}
          docker push ${{ steps.image.outputs.name }}:latest
